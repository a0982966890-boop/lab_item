<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>檢驗項目查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#EFEFEC;
  --text:#1A1A18;--text2:#555550;--text3:#999990;
  --border:#DDDCD8;--border2:#AEADA8;
  --accent:#2D6A4F;--accent-light:#E8F4EE;--accent-mid:#95D5B2;--accent-dark:#1B4332;
}
[data-theme="dark"]{
  --bg:#0A1628;--surface:#112036;--surface2:#172B45;
  --text:#C8E6FF;--text2:#6B93B4;--text3:#3A5570;
  --border:#1E3A5F;--border2:#2A5080;
  --accent:#38BDF8;--accent-light:#0C2D45;--accent-mid:#1565A0;--accent-dark:#7DD3FC;
}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 20px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.header-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.header-title{font-size:14px;font-weight:700;color:var(--accent-dark);letter-spacing:.04em}
.theme-btn{height:26px;padding:0 10px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface2);cursor:pointer;font-size:13px;transition:all .15s;color:var(--text2)}
.theme-btn:hover{border-color:var(--border2);background:var(--surface)}
.search-row{display:flex;gap:8px;align-items:center}
.search-wrap{position:relative;flex:1;max-width:560px}
.search-wrap input{width:100%;height:36px;padding:0 12px 0 32px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:13px}
.clear-btn{height:36px;padding:0 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;transition:all .12s}
.clear-btn:hover{border-color:var(--border2);background:var(--surface2)}
.sort-row{display:flex;gap:5px}
.sort-btn{height:28px;padding:0 9px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
.sort-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.stat{background:var(--accent-light);border-radius:5px;padding:3px 9px;font-size:11px;color:var(--accent-dark);font-weight:500}
.stat strong{font-weight:700;margin-right:2px}
.active-tags{display:flex;gap:5px;flex-wrap:wrap}
.active-tag{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;background:var(--accent);color:#fff;border-radius:20px;font-size:11px;font-weight:500}
.active-tag .rm{cursor:pointer;opacity:.8;font-size:12px;line-height:1;margin-left:1px}
.active-tag .rm:hover{opacity:1}
.tag-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;flex-wrap:wrap;gap:6px}
.tag-bar-unused{}
.tag-bar-unused2{}
.tag{display:inline-flex;align-items:center;gap:4px;height:26px;padding:0 10px;border:1.5px solid var(--border);border-radius:20px;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .12s;background:var(--surface);color:var(--text2);user-select:none;white-space:nowrap}
.tag:last-child{margin-right:0}
.tag:hover{border-color:var(--border2);background:var(--surface2)}
.tag.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.tag.zero{opacity:.3;pointer-events:none}
.tag .cnt{font-size:10px;opacity:.55;font-weight:400;margin-left:1px}
.result-area{padding:12px 20px 60px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.result-count{font-size:12px;color:var(--text3)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--accent);box-shadow:0 3px 12px rgba(45,106,79,.12);transform:translateY(-1px)}
.card-name{font-size:13.5px;font-weight:700;line-height:1.35;margin-bottom:1px}
.card-cn{font-size:10.5px;color:var(--text3);margin-bottom:3px}
.card-code{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text3);margin-bottom:7px}
.card-specimen{font-size:11px;color:var(--text2);padding:3px 7px;background:var(--surface2);border-radius:4px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:5px}
.card-rv{font-size:11px;color:var(--text3);line-height:1.5;margin-top:5px;padding-top:5px;border-top:1px solid var(--surface2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.ctag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:7px;padding-top:5px;border-top:1px solid var(--surface2)}
.card-rt{font-size:10px;color:var(--text3)}
.card-unit{font-size:10px;color:var(--text3);text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55%}
.pg{display:flex;gap:5px;align-items:center;margin-top:18px;flex-wrap:wrap;font-size:12px}
.pg button{height:27px;min-width:27px;padding:0 7px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px;transition:all .12s}
.pg button:hover{background:var(--surface2)}
.pg button.cur{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.pg button:disabled{opacity:.3;cursor:default}
.pg-info{color:var(--text3)}
.no-result{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1;font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:680px;width:100%;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.22);position:relative}
.modal-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%)}
.modal-head h2{font-size:17px;font-weight:700;margin-bottom:2px;line-height:1.3;padding-right:44px;color:var(--accent-dark)}
.modal-head .modal-cn{font-size:12.5px;color:var(--text2);margin-bottom:2px}
.modal-head .code-line{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text3)}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .12s}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:16px 20px 24px;overflow-y:auto;max-height:calc(85vh - 90px)}
.range-box{background:var(--accent-light);border:1.5px solid var(--accent-mid);border-radius:8px;padding:10px 13px;margin-bottom:14px}
.range-label{font-size:9.5px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.range-val{font-size:11.5px;color:var(--text);font-family:"JetBrains Mono",monospace;white-space:pre-wrap;line-height:1.6}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.meta-item{background:var(--surface2);border-radius:7px;padding:8px 10px}
.meta-label{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.meta-value{font-size:12px;font-weight:500;color:var(--text);line-height:1.45}
.section{margin-bottom:14px}
.section-title{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.section-title::before{content:"";width:3px;height:11px;background:var(--accent);border-radius:2px;display:inline-block}
.section-content{font-size:12.5px;color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:break-word}
@media(max-width:600px){.meta-grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="header-title-row"><span class="header-title">🔬 檢驗項目查詢系統</span><button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切換顯示模式">☀️</button></div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="q" placeholder="輸入檢驗名稱、代碼、健保編號、採集容器…" oninput="onSearch()">
    </div>
    <button class="clear-btn" onclick="clearAll()">清除篩選</button>
    <div class="sort-row">
      <button class="sort-btn on" id="sb-rel" onclick="setSortBy('rel')">相關度</button>
      <button class="sort-btn" id="sb-name" onclick="setSortBy('name')">名稱</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><strong id="sc">0</strong>筆符合</div>
    <div class="stat">共 <strong>491</strong> 個項目</div>
    <div class="active-tags" id="active-tags"></div>
  </div>
</div>
<div class="tag-bar" id="tagbar"></div>
<div class="result-area">
  <div class="result-header"><div class="result-count" id="rc"></div></div>
  <div class="cards" id="cards"></div>
  <div class="pg" id="pg"></div>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="m-name"></h2>
      <div class="modal-cn" id="m-cn"></div>
      <div class="code-line" id="m-code"></div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

tone bodies\u4fbf\u5728\u9ad4\u5167 \u5806\u7a4d\uff0c\u9032\u800c\u6392\u81f3\u5c3f\u6db2\u4e2d\u3002\u56e0\u6b64\uff0c\u5728\u7cd6\u5c3f\u75c5\u916e\u9178\u4e2d\u6bd2\u3001\u5916\u79d1\u624b\u8853\u5f8c\uff0c\u8178\u80c3\u969c\u7919\u3001\u9951\u9913\u3001 \u5614\u5410\u7b49\u60c5\u6cc1\uff0c\u5747\u5bb9\u6613\u6aa2\u51fa\u5c3f\u916e\u9ad4\u3002 8\u3001\u5c3f\u81bd\u7d20\u539f(Urobilinogen)\uff1a\u5728\u904b\u52d5\u3001\u98f2\u9152\u3001\u75b2\u52de\u3001\u4fbf\u79d8\u7b49\u72c0\u6cc1\u53ef\u80fd\u51fa\u73fe\u967d\u6027\u7d50\u679c\uff0c\u5065\u5eb7 \u500b\u9ad4\u4ea6\u53ef\u80fd\u5206\u6ccc\u5c11\u91cf\u7684\u5c3f\u81bd\u7d20\u539f\u3002Urobilinogen \u7684\u6e2c\u5b9a\u6709\u52a9\u65bc\u809d\u81df\u75be\u75c5\u3001\u6eb6\u8840\u6027\u75be\u75c5 \u53ca\u81bd\u9053\u963b\u585e\u7b49\u75be\u75c5\u7684\u78ba\u8a8d\uff0c\u82e5\u8207 Bilirubin \u4e00\u8d77\u5224\u8b80\uff0c\u66f4\u6709\u5229\u65bc\u8a3a\u65b7\u3002 9\u3001\u81bd\u7d05\u7d20(Bilirubin)\uff1a\u7531\u65bc Direct bilirubin \u70ba\u6c34\u6eb6\u6027\uff0c\u53ef\u7531\u814e\u6392\u81f3\u5c3f\u4e2d\uff0c\u6b63\u5e38\u4eba\u5c3f\u4e2d\u7d04\u6709 0.02ml/dl\uff0c\u4f4e\u65bc\u6e2c\u8a66\u654f\u611f\u5ea6\u3002\u7576\u81bd\u9053\u963b\u585e\u6642\uff0c\u809d\u81df\u7121\u6cd5\u5c07 Direct bilirubin \u6392\u5230\u81bd\u6c41 \u88e1\uff0c\u8840\u53ca\u5c3f\u4e2d bilirubin \u4fbf\u589e\u52a0\u3002\u6eb6\u8840\u6027\u8ca7\u8840\u8005\uff0c\u96d6\u7136\u8840\u4e2d indirect bilirubin \u6fc3\u5ea6\u6703\u4e0a \u5347\uff0c\u4f46\u809d\u53ef\u5c07\u8f49\u63db\u6210 Direct bilirubin \u4e26\u6392\u81f3\u81bd\u6c41\u4e2d\uff0c\u56e0\u6b64\u5c3f\u4e2d\u6703\u589e\u52a0 urobilinogen\uff0c\u800c bilirubin \u4ecd\u7dad\u6301\u6b63\u5e38\uff0c\u5373\u4f7f\u5c3f\u6db2\u4e2d\u51fa\u73fe\u5341\u5206\u5c11\u91cf\u7684\u81bd\u7d05\u7d20\uff0c\u4e5f\u61c9\u8996\u4f5c\u6709\u610f\u7fa9\u3002 10\u3001\u6f5b\u8840(Blood) \uff1a 10.1 \u8840\u5c3f\uff1a\u7576\u814e\u751f\u6b96\u6ccc\u5c3f\u9053\u51fa\u8840\u3001\u5916\u50b7\u6216\u5668\u5b98 const TAGS_ORDER=["\u514d\u75ab", "\u751f\u5316", "\u611f\u67d3", "\u816b\u7624\u6a19\u8a18", "\u809d\u81df", "\u5c3f\u6db2", "\u81ea\u9ad4\u514d\u75ab", "\u7532\u72c0\u817a", "\u85e5\u7269\u76e3\u6e2c", "\u8ca7\u8840", "\u814e\u81df", "\u5fae\u751f\u7269", "\u8840\u6db2\u5b78", "\u5167\u5206\u6ccc", "\u7cd6\u5c3f\u75c5", "\u51dd\u8840", "\u96fb\u89e3\u8cea", "\u5206\u5b50\u751f\u7269", "\u79fb\u690d", "\u767c\u708e", "\u5fc3\u81df", "\u7cde\u4fbf", "\u8f38\u8840/\u8840\u578b", "\u5fae\u91cf\u5143\u7d20/\u91cd\u91d1\u5c6c", "\u71df\u990a"];
const TAG_COUNTS={"\u514d\u75ab": 197, "\u751f\u5316": 186, "\u816b\u7624\u6a19\u8a18": 97, "\u5167\u5206\u6ccc": 27, "\u7532\u72c0\u817a": 40, "\u71df\u990a": 11, "\u5c3f\u6db2": 65, "\u8f38\u8840/\u8840\u578b": 13, "\u809d\u81df": 93, "\u611f\u67d3": 150, "\u81ea\u9ad4\u514d\u75ab": 47, "\u8ca7\u8840": 39, "\u51dd\u8840": 25, "\u85e5\u7269\u76e3\u6e2c": 40, "\u5fae\u751f\u7269": 34, "\u7cde\u4fbf": 14, "\u814e\u81df": 36, "\u96fb\u89e3\u8cea": 24, "\u5fae\u91cf\u5143\u7d20/\u91cd\u91d1\u5c6c": 13, "\u79fb\u690d": 15, "\u767c\u708e": 15, "\u8840\u6db2\u5b78": 34, "\u7cd6\u5c3f\u75c5": 27, "\u5fc3\u81df": 15, "\u5206\u5b50\u751f\u7269": 23};
const PS=24;
let q='',pg=0,fil=[],sortBy='rel',activeTags=new Set();

function renderTags(){
  const counts={};
  fil.forEach(it=>{(it.tags||[]).forEach(t=>{counts[t]=(counts[t]||0)+1});});
  document.getElementById('tagbar').innerHTML=TAGS_ORDER.map(t=>{
    const total=TAG_COUNTS[t]||0,cur=counts[t]||0,on=activeTags.has(t),zero=!on&&cur===0;
    return `<span class="tag${on?' on':''}${zero?' zero':''}" onclick="toggleTag('${t}')">${TAG_EMOJI[t]||''} ${t}<span class="cnt">${on?cur:total}</span></span>`;
  }).join('');
}
function renderActiveTags(){
  document.getElementById('active-tags').innerHTML=[...activeTags].map(t=>
    `<span class="active-tag">${TAG_EMOJI[t]||''} ${t}<span class="rm" onclick="toggleTag('${t}')">✕</span></span>`
  ).join('');
}
function toggleTag(t){
  if(activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
  pg=0;applyFilter();
}
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('theme-btn').textContent=isDark?'☀️':'🌙';
  localStorage.setItem('theme',isDark?'light':'dark');
}
function score(it,kw){
  if(!kw) return 1;
  const k=kw.toLowerCase();
  let s=0;
  if(it.n.toLowerCase()===k||(it.cn||'').toLowerCase()===k) s+=20;
  else if(it.n.toLowerCase().startsWith(k)) s+=15;
  else if(it.n.toLowerCase().includes(k)) s+=10;
  if((it.cn||'').toLowerCase().includes(k)) s+=8;
  if((it.c||'').toLowerCase().includes(k)) s+=9;
  if((it.ins||'').toLowerCase().includes(k)) s+=7;
  if((it.sp||'').toLowerCase().includes(k)) s+=5;
  if((it.ct||'').toLowerCase().includes(k)) s+=4;
  if((it.g||'').toLowerCase().includes(k)) s+=3;
  if((it.rv||'').toLowerCase().includes(k)) s+=2;
  if((it.cl||'').toLowerCase().includes(k)) s+=1;
  return s;
}
function applyFilter(){
  const kw=q.trim();
  let res=ALL;
  if(kw){
    res=res.map(it=>{return{it,s:score(it,kw)}}).filter(x=>x.s>0);
    if(sortBy==='rel') res.sort((a,b)=>b.s-a.s);
    else res.sort((a,b)=>a.it.n.localeCompare(b.it.n,'zh-TW'));
    res=res.map(x=>x.it);
  } else if(sortBy==='name') {
    res=[...ALL].sort((a,b)=>a.n.localeCompare(b.n,'zh-TW'));
  }
  if(activeTags.size>0) res=res.filter(it=>Array.from(activeTags).every(t=>(it.tags||[]).includes(t)));
  fil=res;
  renderTags();renderActiveTags();
  document.getElementById('sc').textContent=fil.length;
  renderPage();
}
function renderPage(){
  const total=fil.length,start=pg*PS,page=fil.slice(start,start+PS);
  const cards=document.getElementById('cards');
  if(!total){
    cards.innerHTML='<div class="no-result">找不到符合的檢驗項目<br><small>請嘗試其他關鍵字或清除標籤篩選</small></div>';
    document.getElementById('pg').innerHTML='';document.getElementById('rc').textContent='';return;
  }
  document.getElementById('rc').textContent=`顯示第 ${start+1}–${Math.min(start+PS,total)} 筆，共 ${total} 筆`;
  cards.innerHTML=page.map((it,i)=>{
    const cn=it.cn?`<div class="card-cn">${esc(it.cn)}</div>`:'';
    const code=[it.c,it.ins].filter(Boolean).join(' · ');
    const rv=it.rv?`<div class="card-rv">${esc(it.rv.slice(0,100))}${it.rv.length>100?'…':''}</div>`:'';
    const sp=it.sp?`<span class="card-specimen">🧪 ${esc(it.sp.slice(0,40))}${it.sp.length>40?'…':''}</span>`:'';
    const tagHtml=(it.tags||[]).slice(0,4).map(t=>`<span class="ctag">${TAG_EMOJI[t]||''} ${esc(t)}</span>`).join('');
    const rt=it.rt?`<span class="card-rt">⏱ ${esc(it.rt.slice(0,30))}</span>`:'';
    const unit=it.g?`<span class="card-unit" title="${esc(it.g)}">${esc(it.g.slice(0,22))}${it.g.length>22?'…':''}</span>`:'';
    return `<div class="card" onclick="openModal(${start+i})">
      <div class="card-name">${esc(it.n)}</div>
      ${cn}<div class="card-code">${esc(code)}</div>
      ${sp}${rv}<div class="card-tags">${tagHtml}</div>
      <div class="card-footer">${rt}${unit}</div>
    </div>`;
  }).join('');
  renderPg(total);
}
function renderPg(total){
  const tot=Math.ceil(total/PS);
  if(tot<=1){document.getElementById('pg').innerHTML='';return;}
  let h=`<span class="pg-info">第${pg+1}/${tot}頁</span>`;
  h+=`<button onclick="goPg(${pg-1})" ${!pg?'disabled':''}>‹</button>`;
  const s=Math.max(0,pg-3),e=Math.min(tot,pg+4);
  if(s>0) h+=`<button onclick="goPg(0)">1</button>${s>1?'<span>…</span>':''}`;
  for(let i=s;i<e;i++) h+=`<button class="${i===pg?'cur':''}" onclick="goPg(${i})">${i+1}</button>`;
  if(e<tot) h+=`${e<tot-1?'<span>…</span>':''}<button onclick="goPg(${tot-1})">${tot}</button>`;
  h+=`<button onclick="goPg(${pg+1})" ${pg>=tot-1?'disabled':''}>›</button>`;
  document.getElementById('pg').innerHTML=h;
}
function goPg(n){pg=n;renderPage();window.scrollTo(0,0);}
function onSearch(){q=document.getElementById('q').value;pg=0;applyFilter();}
function setSortBy(s){sortBy=s;document.getElementById('sb-rel').classList.toggle('on',s==='rel');document.getElementById('sb-name').classList.toggle('on',s==='name');pg=0;applyFilter();}
function clearAll(){q='';activeTags.clear();document.getElementById('q').value='';pg=0;applyFilter();}
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function openModal(idx){
  const it=fil[idx];
  document.getElementById('m-name').textContent=it.n;
  document.getElementById('m-cn').textContent=it.cn||'';
  document.getElementById('m-code').textContent=[it.c,it.ins].filter(Boolean).join(' · ');
  let body='';
  if(it.rv) body+=`<div class="range-box"><div class="range-label">📊 參考值 / Reference Range</div><div class="range-val">${esc(it.rv)}</div></div>`;
  body+='<div class="meta-grid">';
  if(it.sp) body+=`<div class="meta-item"><div class="meta-label">檢體種類</div><div class="meta-value">${esc(it.sp)}</div></div>`;
  if(it.ct) body+=`<div class="meta-item"><div class="meta-label">採集容器</div><div class="meta-value">${esc(it.ct)}</div></div>`;
  if(it.d) body+=`<div class="meta-item"><div class="meta-label">採檢體量</div><div class="meta-value">${esc(it.d)}</div></div>`;
  if(it.rt) body+=`<div class="meta-item"><div class="meta-label">報告時效</div><div class="meta-value">${esc(it.rt)}</div></div>`;
  if(it.g) body+=`<div class="meta-item"><div class="meta-label">操作單位</div><div class="meta-value">${esc(it.g)}</div></div>`;
  if(it.st) body+=`<div class="meta-item"><div class="meta-label">送檢時間</div><div class="meta-value">${esc(it.st)}</div></div>`;
  body+='</div>';
  if(it.cl) body+=`<div class="section"><div class="section-title">臨床意義</div><div class="section-content">${esc(it.cl)}</div></div>`;
  if(it.notes) body+=`<div class="section"><div class="section-title">注意事項</div><div class="section-content">${esc(it.notes)}</div></div>`;
  if(it.tags&&it.tags.length) body+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">${it.tags.map(t=>`<span class="ctag">${TAG_EMOJI[t]||''} ${esc(t)}</span>`).join('')}</div>`;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('overlay')) closeModalBtn();}
function closeModalBtn(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModalBtn();});
(function(){
  const saved=localStorage.getItem('theme');
  if(saved==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('theme-btn').textContent='🌙';}
})();
applyFilter();
</script>
</body>
</html>
