<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>檢驗項目查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#EFEFEC;
  --text:#1A1A18;--text2:#555550;--text3:#999990;
  --border:#DDDCD8;--border2:#AEADA8;
  --accent:#2D6A4F;--accent-light:#E8F4EE;--accent-mid:#95D5B2;--accent-dark:#1B4332;
}
[data-theme="dark"]{
  --bg:#0A1628;--surface:#112036;--surface2:#172B45;
  --text:#C8E6FF;--text2:#6B93B4;--text3:#3A5570;
  --border:#1E3A5F;--border2:#2A5080;
  --accent:#38BDF8;--accent-light:#0C2D45;--accent-mid:#1565A0;--accent-dark:#7DD3FC;
}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
/* ── Loading overlay ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#loading.hide{display:none}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3)}
/* ── GAS URL banner ── */
#gas-banner{background:#fff8e1;border-bottom:1px solid #ffe082;padding:8px 20px;font-size:12px;color:#7a5800;display:flex;align-items:center;gap:8px}
#gas-banner.hide{display:none}
#gas-url-input{flex:1;max-width:560px;height:28px;padding:0 8px;border:1px solid #ffe082;border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:#333}
#gas-url-input:focus{outline:none;border-color:#ffb300}
.gas-btn{height:28px;padding:0 12px;border:1px solid #ffb300;border-radius:5px;background:#ffb300;color:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.gas-btn:hover{background:#ffa000}
.gas-btn.sec{background:transparent;color:#7a5800;border-color:#ffe082}
.gas-btn.sec:hover{background:#fff8e1}
/* ── Header ── */
.header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 20px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.header-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.header-title{font-size:14px;font-weight:700;color:var(--accent-dark);letter-spacing:.04em}
.header-right{display:flex;gap:6px;align-items:center}
.theme-btn,.reload-btn{height:26px;padding:0 10px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface2);cursor:pointer;font-size:12px;transition:all .15s;color:var(--text2)}
.theme-btn:hover,.reload-btn:hover{border-color:var(--border2);background:var(--surface)}
.search-row{display:flex;gap:8px;align-items:center}
.search-wrap{position:relative;flex:1;max-width:560px}
.search-wrap input{width:100%;height:36px;padding:0 12px 0 32px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:13px}
.clear-btn{height:36px;padding:0 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;transition:all .12s}
.clear-btn:hover{border-color:var(--border2);background:var(--surface2)}
.sort-row{display:flex;gap:5px}
.sort-btn{height:28px;padding:0 9px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
.sort-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.stat{background:var(--accent-light);border-radius:5px;padding:3px 9px;font-size:11px;color:var(--accent-dark);font-weight:500}
.stat strong{font-weight:700;margin-right:2px}
.active-tags{display:flex;gap:5px;flex-wrap:wrap}
.active-tag{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;background:var(--accent);color:#fff;border-radius:20px;font-size:11px;font-weight:500}
.active-tag .rm{cursor:pointer;opacity:.8;font-size:12px;line-height:1;margin-left:1px}
.active-tag .rm:hover{opacity:1}
.tag-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;flex-wrap:wrap;gap:6px}
.tag{display:inline-flex;align-items:center;gap:4px;height:26px;padding:0 10px;border:1.5px solid var(--border);border-radius:20px;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .12s;background:var(--surface);color:var(--text2);user-select:none;white-space:nowrap}
.tag:hover{border-color:var(--border2);background:var(--surface2)}
.tag.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.tag.zero{opacity:.3;pointer-events:none}
.tag .cnt{font-size:10px;opacity:.55;font-weight:400;margin-left:1px}
.result-area{padding:12px 20px 60px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--accent);box-shadow:0 3px 12px rgba(45,106,79,.12);transform:translateY(-1px)}
.card-name{font-size:13.5px;font-weight:700;line-height:1.35;margin-bottom:1px}
.card-cn{font-size:10.5px;color:var(--text3);margin-bottom:3px}
.card-code{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text3);margin-bottom:6px}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.card-chip{font-size:10.5px;color:var(--text2);padding:2px 7px;background:var(--surface2);border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.card-chip.method{color:var(--accent-dark);background:var(--accent-light)}
.card-rv{font-size:11px;color:var(--text3);line-height:1.5;margin-top:5px;padding-top:5px;border-top:1px solid var(--surface2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.ctag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:7px;padding-top:5px;border-top:1px solid var(--surface2)}
.card-rt{font-size:10px;color:var(--text3)}
.card-unit{font-size:10px;color:var(--text3);text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.pg{display:flex;gap:5px;align-items:center;margin-top:18px;flex-wrap:wrap;font-size:12px}
.pg button{height:27px;min-width:27px;padding:0 7px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px;transition:all .12s}
.pg button:hover{background:var(--surface2)}
.pg button.cur{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.pg-info{color:var(--text3)}
.no-result{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1;font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:720px;width:100%;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.22);position:relative}
.modal-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%)}
.modal-head h2{font-size:17px;font-weight:700;margin-bottom:2px;line-height:1.3;padding-right:44px;color:var(--accent-dark)}
.modal-cn{font-size:12.5px;color:var(--text2);margin-bottom:2px}
.code-line{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text3)}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .12s}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:16px 20px 24px;overflow-y:auto;max-height:calc(85vh - 90px)}
.range-box{background:var(--accent-light);border:1.5px solid var(--accent-mid);border-radius:8px;padding:10px 13px;margin-bottom:14px}
.range-label{font-size:9.5px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.range-val{font-size:11.5px;color:var(--text);font-family:"JetBrains Mono",monospace;white-space:pre-wrap;line-height:1.6}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.meta-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.meta-item{background:var(--surface2);border-radius:7px;padding:8px 10px}
.meta-label{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.meta-value{font-size:12px;font-weight:500;color:var(--text);line-height:1.45}
.section{margin-bottom:14px}
.section-title{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.section-title::before{content:"";width:3px;height:11px;background:var(--accent);border-radius:2px;display:inline-block}
.section-content{font-size:12.5px;color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:break-word}
.err-box{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px 16px;font-size:12px;color:#7a5800;grid-column:1/-1}
.alpha-bar{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.alpha-btn{height:24px;min-width:24px;padding:0 4px;border:1.5px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:"JetBrains Mono",monospace;transition:all .12s;line-height:1}
.alpha-btn:hover{border-color:var(--border2);background:var(--surface2)}
.alpha-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.alpha-btn.zero{opacity:.25;pointer-events:none}
.alpha-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
@media(max-width:600px){.meta-grid{grid-template-columns:1fr}.meta-grid-3{grid-template-columns:1fr 1fr}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 載入中畫面 -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">載入資料中…</div>
</div>

<!-- GAS 網址設定列 -->
<div id="gas-banner">
  <span>⚙️ GAS 網址：</span>
  <input id="gas-url-input" type="text" placeholder="貼上你的 Web App 網址，例如 https://script.google.com/macros/s/…/exec">
  <button class="gas-btn" onclick="saveAndLoad()">載入</button>
  <button class="gas-btn sec" onclick="hideBanner()">▲ 收起</button>
</div>

<!-- 主介面 -->
<div class="header">
  <div class="header-title-row">
    <span class="header-title">🔬 檢驗項目查詢系統</span>
    <div class="header-right">
      <div class="alpha-bar" id="alpha-bar"></div>
      <button class="reload-btn" onclick="reloadData()" title="重新從 GAS 載入資料">🔄 重新載入</button>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
    </div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="q" placeholder="輸入檢驗名稱、代碼、健保編號、採集容器、檢驗方法…" oninput="onSearch()">
    </div>
    <button class="clear-btn" onclick="clearAll()">清除篩選</button>
    <div class="sort-row">
      <button class="sort-btn on" id="sb-rel" onclick="setSortBy('rel')">相關度</button>
      <button class="sort-btn" id="sb-name" onclick="setSortBy('name')">名稱</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><strong id="sc">0</strong>筆符合</div>
    <div class="stat">共 <strong id="total-count">—</strong> 個項目</div>
    <div class="active-tags" id="active-tags"></div>
  </div>
</div>
<div class="tag-bar" id="tagbar"></div>
<div class="result-area">
  <div class="cards" id="cards"></div>
  <div class="pg" id="pg"></div>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="m-name"></h2>
      <div class="modal-cn" id="m-cn"></div>
      <div class="code-line" id="m-code"></div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════
const GAS_URL_KEY = 'lab_gas_url';  // localStorage key

const TAG_ORDER = [
  '生化','電解質','免疫','分子生物','基因','血液學','凝血','血庫','鏡檢','微生物','微量元素/重金屬',
  '肝膽腸胃','腎臟','心臟','甲狀腺/副甲狀腺','內分泌',
  '感染','自體免疫','腫瘤標記','藥物監測',
  '貧血','糖尿病','移植','發炎','營養','尿液','糞便'
];
const TAG_EMOJI = {
  '生化':'🧪','電解質':'⚡','免疫':'🛡️','分子生物':'🧬','基因':'🔬','血液學':'🩸','凝血':'💉',
  '血庫':'🏦','鏡檢':'🔭','微生物':'🦠','微量元素/重金屬':'⚗️',
  '肝膽腸胃':'🫁','腎臟':'🫘','心臟':'❤️','甲狀腺/副甲狀腺':'🦋','內分泌':'⚖️',
  '感染':'🔴','自體免疫':'🎯','腫瘤標記':'📊','藥物監測':'💊',
  '貧血':'🌡️','糖尿病':'🍬','移植':'🔗','發炎':'🔥','營養':'🥗','尿液':'💧','糞便':'🟫'
};

// ══════════════════════════════════════════════
//  狀態
// ══════════════════════════════════════════════
let ALL = [], filtered = [], page = 1;
let activeTags = new Set(), sortBy = 'rel', searchQ = '', activeAlpha = '';

// ══════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwyAHVr5YxxBT5_kXNHtR6CdGHDxO0_RrynQ4PkqjX7gWByOP1ncytsSHPZjjvTamKM/exec';

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gas-url-input').value = GAS_URL;
  hideBanner();
  loadFromGAS(GAS_URL);
});

// ══════════════════════════════════════════════
//  GAS 資料載入
// ══════════════════════════════════════════════
function saveAndLoad() {
  const url = document.getElementById('gas-url-input').value.trim();
  if (!url) { alert('請先貼上 GAS Web App 網址'); return; }
  localStorage.setItem(GAS_URL_KEY, url);
  hideBanner();
  loadFromGAS(url);
}

function reloadData() {
  loadFromGAS(GAS_URL);
}

function loadFromGAS(url) {
  document.getElementById('loading').classList.remove('hide');

  // 用 JSONP 繞過 CORS（GAS 支援 ?callback=xxx）
  const cbName = '_gasCallback_' + Date.now();
  const script = document.createElement('script');

  const timer = setTimeout(() => {
    cleanup();
    showError('載入逾時，請確認 GAS 網址正確且已部署');
  }, 15000);

  window[cbName] = function(data) {
    cleanup();
    ALL = data;
    document.getElementById('total-count').textContent = ALL.length;
    page = 1; activeTags.clear(); searchQ = '';
    document.getElementById('q').value = '';
    render();
    document.getElementById('loading').classList.add('hide');
  };

  script.onerror = function() {
    cleanup();
    showError('無法載入腳本，請確認 GAS 網址正確且存取權設為「所有人」');
  };

  function cleanup() {
    clearTimeout(timer);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  function showError(msg) {
    document.getElementById('loading').classList.add('hide');
    document.getElementById('cards').innerHTML =
      `<div class="err-box">❌ 無法載入資料：${msg}<br><br>
      請確認：<br>
      1. GAS 已部署為「網路應用程式」<br>
      2. 存取權設為「所有人（包含匿名使用者）」<br>
      3. 網址正確（結尾為 /exec）<br>
      4. 已使用最新版的 Code.gs（支援 JSONP）</div>`;
  }

  script.src = `${url}?callback=${cbName}`;
  document.head.appendChild(script);
}

function hideBanner() { document.getElementById('gas-banner').classList.add('hide'); }
function showBanner() { document.getElementById('gas-banner').classList.remove('hide'); }

// ══════════════════════════════════════════════
//  主題切換
// ══════════════════════════════════════════════
function toggleTheme() {
  const d = document.documentElement;
  const isDark = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', isDark ? '' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
}

// ══════════════════════════════════════════════
//  標籤列
// ══════════════════════════════════════════════
function buildTagBar() {
  const bar = document.getElementById('tagbar');
  bar.innerHTML = '';
  const dynCounts = getDynCounts();
  const totalCounts = getTotalCounts();
  TAG_ORDER.forEach(t => {
    const on = activeTags.has(t);
    const cnt = on ? dynCounts[t] : totalCounts[t];
    const zero = !on && cnt === 0;
    const btn = document.createElement('button');
    btn.className = 'tag' + (on ? ' on' : '') + (zero ? ' zero' : '');
    btn.innerHTML = `${TAG_EMOJI[t] || ''} ${t} <span class="cnt">${cnt}</span>`;
    btn.onclick = () => toggleTag(t);
    bar.appendChild(btn);
  });
}

function getTotalCounts() {
  const c = {}; TAG_ORDER.forEach(t => c[t] = 0);
  ALL.forEach(r => r.tags.forEach(t => { if (c[t] !== undefined) c[t]++; }));
  return c;
}

function getDynCounts() {
  const base = getBaseFiltered();
  const c = {}; TAG_ORDER.forEach(t => c[t] = 0);
  base.forEach(r => r.tags.forEach(t => { if (c[t] !== undefined) c[t]++; }));
  return c;
}

// ══════════════════════════════════════════════
//  篩選 & 排序
// ══════════════════════════════════════════════
function getBaseFiltered() {
  const q = searchQ.toLowerCase();
  return ALL.filter(r => {
    const tagMatch = activeTags.size === 0 || [...activeTags].every(t => r.tags.includes(t));
    if (!tagMatch) return false;
    if (activeAlpha && !(r.n || '').toUpperCase().startsWith(activeAlpha)) return false;
    if (!q) return true;
    return (r.n + r.cn + r.c + r.ins + r.sp + r.ct + r.method + r.g).toLowerCase().includes(q);
  });
}

function buildAlphaBar() {
  const bar = document.getElementById('alpha-bar');
  bar.innerHTML = '';
  // 計算哪些字母有資料（不受 alpha 篩選自身影響，但受 tag/search 影響）
  const base = ALL.filter(r => {
    const tagMatch = activeTags.size === 0 || [...activeTags].every(t => r.tags.includes(t));
    if (!tagMatch) return false;
    const q = searchQ.toLowerCase();
    if (!q) return true;
    return (r.n + r.cn + r.c + r.ins + r.sp + r.ct + r.method + r.g).toLowerCase().includes(q);
  });
  const available = new Set(base.map(r => (r.n || '').charAt(0).toUpperCase()).filter(c => /[A-Z]/.test(c)));

  // 全部按鈕
  const allBtn = document.createElement('button');
  allBtn.className = 'alpha-btn' + (activeAlpha === '' ? ' on' : '');
  allBtn.textContent = 'ALL';
  allBtn.style.minWidth = '32px';
  allBtn.onclick = () => { activeAlpha = ''; page = 1; render(); };
  bar.appendChild(allBtn);

  const sep = document.createElement('span');
  sep.className = 'alpha-sep';
  bar.appendChild(sep);

  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'alpha-btn' + (activeAlpha === c ? ' on' : '') + (available.has(c) ? '' : ' zero');
    btn.textContent = c;
    btn.onclick = () => { activeAlpha = activeAlpha === c ? '' : c; page = 1; render(); };
    bar.appendChild(btn);
  });
}

function toggleTag(t) {
  activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
  page = 1; render();
}
function onSearch() { searchQ = document.getElementById('q').value; page = 1; render(); }
function clearAll() {
  activeTags.clear();
  document.getElementById('q').value = ''; searchQ = ''; sortBy = 'rel'; activeAlpha = '';
  document.getElementById('sb-rel').classList.add('on');
  document.getElementById('sb-name').classList.remove('on');
  page = 1; render();
}
function setSortBy(s) {
  sortBy = s;
  document.getElementById('sb-rel').classList.toggle('on', s === 'rel');
  document.getElementById('sb-name').classList.toggle('on', s === 'name');
  page = 1; render();
}

// ══════════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════════
function render() {
  filtered = getBaseFiltered();
  if (sortBy === 'name') filtered.sort((a, b) => a.n.localeCompare(b.n, 'zh'));
  document.getElementById('sc').textContent = filtered.length;
  renderActiveTags();
  buildTagBar();
  buildAlphaBar();
  renderCards();
  renderPagination();
}

function renderActiveTags() {
  const el = document.getElementById('active-tags');
  el.innerHTML = '';
  activeTags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'active-tag';
    span.innerHTML = `${TAG_EMOJI[t] || ''} ${t} <span class="rm" onclick="toggleTag('${t}')">✕</span>`;
    el.appendChild(span);
  });
}

const PER_PAGE = 20;
function renderCards() {
  const el = document.getElementById('cards');
  const items = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  if (!items.length) { el.innerHTML = '<div class="no-result">😔 無符合項目</div>'; return; }
  el.innerHTML = items.map(r => {
    const tags = r.tags.map(t => `<span class="ctag">${TAG_EMOJI[t] || ''}${t}</span>`).join('');
    const methodChip = r.method ? `<span class="card-chip method">${r.method.slice(0, 20)}</span>` : '';
    const spChip = r.sp ? `<span class="card-chip">${r.sp.slice(0, 20)}</span>` : '';
    const rvSnip = r.rv ? `<div class="card-rv">${r.rv.slice(0, 120)}</div>` : '';
    return `<div class="card" onclick="openModal(${ALL.indexOf(r)})">
      <div class="card-name">${r.n || '(未命名)'}</div>
      ${r.cn ? `<div class="card-cn">${r.cn}</div>` : ''}
      <div class="card-code">${r.c || ''}${r.ins ? ' · ' + r.ins : ''}</div>
      <div class="card-meta">${methodChip}${spChip}</div>
      ${rvSnip}
      <div class="card-tags">${tags}</div>
      <div class="card-footer">
        <span class="card-rt">${r.rt ? '⏱ ' + r.rt : ''}</span>
        <span class="card-unit">${r.g || ''}</span>
      </div>
    </div>`;
  }).join('');
}

function renderPagination() {
  const el = document.getElementById('pg');
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (total <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (page > 1) html += `<button onclick="goPage(${page - 1})">‹</button>`;
  const s = Math.max(1, page - 2), e = Math.min(total, page + 2);
  if (s > 1) html += `<button onclick="goPage(1)">1</button>${s > 2 ? '<span class="pg-info">…</span>' : ''}`;
  for (let i = s; i <= e; i++) html += `<button class="${i === page ? 'cur' : ''}" onclick="goPage(${i})">${i}</button>`;
  if (e < total) html += `${e < total - 1 ? '<span class="pg-info">…</span>' : ''}<button onclick="goPage(${total})">${total}</button>`;
  if (page < total) html += `<button onclick="goPage(${page + 1})">›</button>`;
  html += `<span class="pg-info"> 第${page}/${total}頁・共${filtered.length}筆</span>`;
  el.innerHTML = html;
}
function goPage(p) { page = p; renderCards(); renderPagination(); window.scrollTo(0, 0); }

// ══════════════════════════════════════════════
//  Modal
// ══════════════════════════════════════════════
function openModal(idx) {
  const r = ALL[idx];
  document.getElementById('m-name').textContent = r.n || '(未命名)';
  document.getElementById('m-cn').textContent = r.cn || '';
  document.getElementById('m-code').textContent = [r.c, r.ins, r.pts].filter(Boolean).join(' · ');

  const tags = r.tags.map(t => `<span class="ctag" style="font-size:11px;padding:2px 8px">${TAG_EMOJI[t] || ''} ${t}</span>`).join(' ');
  let html = '';
  if (r.tags.length) html += `<div style="margin-bottom:14px;display:flex;flex-wrap:wrap;gap:5px">${tags}</div>`;
  if (r.rv) html += `<div class="range-box"><div class="range-label">📋 參考值範圍</div><div class="range-val">${esc(r.rv)}</div></div>`;

  html += `<div class="meta-grid">`;
  if (r.sp) html += mi('🧫 檢體種類', r.sp);
  if (r.method) html += mi('⚙️ 檢驗方法', r.method);
  if (r.ct) html += mi('🧪 採集容器', r.ct);
  if (r.d) html += mi('📏 採檢體量', r.d);
  if (r.unit) html += mi('📐 項目單位', r.unit);
  if (r.g) html += mi('🏥 操作單位', r.g);
  html += `</div>`;

  html += `<div class="meta-grid-3">`;
  if (r.st) html += mi('🕐 送檢時間', r.st);
  if (r.optime) html += mi('⏰ 操作時間', r.optime);
  if (r.rt) html += mi('📤 報告時間', r.rt);
  html += `</div>`;

  html += `<div class="meta-grid">`;
  if (r.cdate) html += mi('📅 制訂日期', r.cdate);
  if (r.rdate) html += mi('🔄 修訂日期', r.rdate);
  html += `</div>`;

  if (r.cl) html += section('臨床意義', r.cl);
  const noVal = v => !v || v === '無' || v === 'NaN' || v === 'nan';
  if (!noVal(r.inter)) html += section('干擾因素', r.inter);
  if (!noVal(r.ref)) html += section('參考檢驗', r.ref);
  if (!noVal(r.notes)) html += section('注意事項', r.notes);

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function mi(label, val) {
  return `<div class="meta-item"><div class="meta-label">${label}</div><div class="meta-value">${esc(val)}</div></div>`;
}
function section(title, val) {
  return `<div class="section"><div class="section-title">${title}</div><div class="section-content">${esc(val)}</div></div>`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function closeModal(e) { if (e.target === document.getElementById('overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });
</script>
</body>
</html>
